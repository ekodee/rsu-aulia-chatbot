version: "3.8"

services:
  # 1. DATABASE MYSQL
  mysql_db:
    image: mysql:8.0
    container_name: rsu_database
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: rsu_aulia
      MYSQL_ROOT_PASSWORD: password_rahasia_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 512M

  # 2. AI ENGINE (FASTAPI)
  ai_engine:
    build:
      context: ./rsu-ai-engine
      dockerfile: Dockerfile
    container_name: rsu_fastapi
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./rsu-ai-engine/.env
    depends_on:
      - mysql_db

  # 3. BACKEND & ADMIN (LARAVEL)
  laravel_app:
    image: bitnami/laravel:11
    container_name: rsu_laravel
    restart: unless-stopped
    ports:
      - "8080:8000"
    environment:
      - DB_HOST=mysql_db
      - DB_PORT=3306
      - DB_DATABASE=rsu_aulia
      - DB_USERNAME=root
      - DB_PASSWORD=password_rahasia_db
    volumes:
      - ./rsu-chatbot-admin:/app
    depends_on:
      - mysql_db

volumes:
  mysql_data:
